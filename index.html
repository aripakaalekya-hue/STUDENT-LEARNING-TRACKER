<!DOCTYPE html>
<html>
<head>
    <title>Student Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>📘 Student Learning Tracker</h1>

<a href="/add">➕ Add Student</a>

<table>
    <tr>
        <th>Name</th>
        <th>Subject</th>
        <th>Progress</th>
        <th>Action</th>
    </tr>

    {% for s in students %}
    <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.subject }}</td>
        <td>{{ s.progress }}%</td>
        <td><a href="/view/{{ loop.index0 }}">View</a></td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
